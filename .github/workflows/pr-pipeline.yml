name: pr pipeline

on:
  pull_request:
    type: [opened, synchronized]

jobs:
  
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      run_tests: true

  pr-comment:

    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read     # Required for checkout
      issues: write
    if: needs.build-test.result == 'success'

    steps:

      - name: Check Dependencies for Vulnerabilities
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

      - name: print summary
        #run: |
        #  echo "PR checks passed for branch :" ${{ github.head_ref }}
        #  echo "Test results :" ${{ needs.build-test.outputs.test_result }}
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            await github.rest.issues.createComment({
              issue_number: issue_number,
              owner: owner,
              repo: repo,
              body: 'PR checks passed for branch : ${{ github.head_ref }}'
            });